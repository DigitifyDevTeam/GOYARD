# SonarQube / SonarCloud – full project (React frontend + Python backend)
# Run from repo root: npx sonar-scanner (or use scripts/sonar_analyze_and_report.py)

# Project key (SonarCloud: set in UI; e.g. my-org_brasenplus)
# Override with -Dsonar.projectKey=... or env SONAR_PROJECT_KEY
sonar.projectKey=brasenplus

# All source roots (frontend + backend)
sonar.sources=react/src,backend

# Exclusions (both apps)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.vite/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/migrations/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/.venv/**,\
  **/*.pyc,\
  **/ai_detector/ai_model/**,\
  **/test_*.py,\
  **/debug_*.py,\
  **/read_excel*.py

# Encoding
sonar.sourceEncoding=UTF-8

# Optional: coverage (uncomment when you have reports)
# sonar.javascript.lcov.reportPaths=react/coverage/lcov.info
# sonar.python.coverage.reportPaths=backend/coverage.xml
