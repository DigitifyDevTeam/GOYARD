# SonarQube / SonarCloud – React TypeScript project
# See: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/overview

# Project key (SonarCloud: set in UI or use organization/repo)
# sonar.projectKey=my-org_my-repo

# Sources and exclusions
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Tests (if you add unit tests)
# sonar.tests=src
# sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (when you have coverage reports)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
